version: '3.8'

services:

  # ─── Banco de Dados ───────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: neritech-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - neritech-network

  # ─── Backend (Spring Boot) ────────────────────────────────
  backend:
    image: neritechauto-backend:latest
    container_name: neritech-api
    restart: on-failure
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://neritech-db:5432/${DB_NAME}?prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSizeMiB=0
      DATABASE_USERNAME: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_TRIAL_PRICE_ID: ${STRIPE_TRIAL_PRICE_ID}
    ports:
      - "8080:8080"
    networks:
      - neritech-network

  # ─── Nginx (Proxy Reverso) ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: neritech-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - nginx_conf:/etc/nginx/conf.d
    depends_on:
      - backend
    networks:
      - neritech-network

networks:
  neritech-network:
    driver: bridge

volumes:
  pgdata:
  nginx_conf:
