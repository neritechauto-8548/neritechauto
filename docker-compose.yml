version: '3.8'

services:

  # ─── Banco de Dados ───────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: neritech-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - neritech-network

  # ─── Backend (Spring Boot) ────────────────────────────────
  backend:
    image: ghcr.io/neritechauto-8548/neritechauto-backend:latest
    container_name: neritech-api
    restart: on-failure
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:postgresql://neritech-db:5432/${DB_NAME}?prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSizeMiB=0
      DATABASE_USERNAME: ${DB_USER}
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_TRIAL_PRICE_ID: ${STRIPE_TRIAL_PRICE_ID}
      STRIPE_PRODUCT_START: ${STRIPE_PRODUCT_START}
      STRIPE_PRODUCT_PRO: ${STRIPE_PRODUCT_PRO}
      STRIPE_PRODUCT_ELITE: ${STRIPE_PRODUCT_ELITE}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - neritech-network

  # ─── Nginx ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: neritech-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - neritech-network

  # ─── Certbot (Auto-Renovação) ────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: neritech-certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - neritech-network

  # ─── Watchtower (Deploy Automático) ──────────────────────
  watchtower:
    image: containrrr/watchtower
    container_name: neritech-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Checa a cada 30 segundos, apaga a imagem velha (--cleanup) e só mexe no neritech-api
    command: --interval 30 --cleanup neritech-api
    networks:
      - neritech-network

networks:
  neritech-network:
    driver: bridge

volumes:
  pgdata:
  letsencrypt:
  certbot_www:

configs:
  nginx_conf:
    content: |
      server {
          listen 80;
          server_name api.neritechauto.com.br;

          location /.well-known/acme-challenge/ {
              root /var/www/certbot;
          }

          location / {
              return 301 https://$$host$$request_uri;
          }
      }

      server {
          listen 443 ssl;
          server_name api.neritechauto.com.br;

          ssl_certificate     /etc/letsencrypt/live/api.neritechauto.com.br/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/api.neritechauto.com.br/privkey.pem;
          ssl_protocols TLSv1.2 TLSv1.3;
          ssl_ciphers HIGH:!aNULL:!MD5;
          ssl_prefer_server_ciphers on;

          location /api/ {
              proxy_pass http://neritech-api:8080/api/;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
          }

          location /health {
              access_log off;
              return 200 'OK';
          }
      }
