<!-- Cabeçalho Moderno com Efeitos Especiais -->
<mat-toolbar class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 !h-16 !px-4 sticky top-0 z-50 flex items-center justify-between">

  <!-- Left: Logo & Toggle -->
  <div class="flex items-center gap-4">
    @if (showToggle) {
      <button mat-icon-button (click)="toggleSidenav.emit()">
        <mat-icon>menu</mat-icon>
      </button>
    }

    <!-- Logo (Visible on Mobile or when Branding hidden in Sidebar) -->
    <div class="flex items-center gap-2" [class.hidden]="!showBranding">
       <svg width="120" height="32" viewBox="0 0 140 36" fill="none" xmlns="http://www.w3.org/2000/svg">
         <!-- Icon/Symbol -->
         <rect x="0" y="0" width="36" height="36" rx="8" fill="url(#headerGradient)" />
         <path d="M18 10L26 18L18 26L10 18L18 10Z" fill="white" opacity="0.9"/>
         <circle cx="18" cy="18" r="3" fill="white"/>

         <!-- Gradient Definition -->
         <defs>
           <linearGradient id="headerGradient" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
             <stop offset="0%" stop-color="#2563EB"/>
             <stop offset="100%" stop-color="#1d4ed8"/>
           </linearGradient>
         </defs>

         <!-- Text "NeriTech" -->
         <text x="44" y="24" font-family="Inter, sans-serif" font-size="18" font-weight="700" letter-spacing="-0.02em" fill="currentColor" class="text-slate-900 dark:text-white">
           Neri<tspan fill="#2563EB">Tech</tspan>
         </text>
       </svg>
    </div>
  </div>

  <!-- Center: Global Search -->
  <div class="flex-1 px-8 max-w-3xl hidden md:block">
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <mat-icon class="text-slate-400 text-[20px] w-[20px] h-[20px]">search</mat-icon>
      </div>
      <input
        type="text"
        class="block w-full pl-10 pr-3 py-2 border border-slate-200 dark:border-slate-700 rounded-lg leading-5 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm transition duration-150 ease-in-out"
        placeholder="Buscar ordens, clientes, veículos... (Ctrl+K)"
      />
      <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
        <span class="text-slate-400 text-xs border border-slate-300 dark:border-slate-600 rounded px-1.5 py-0.5">⌘K</span>
      </div>
    </div>
  </div>

  <!-- Right: Actions -->
  <div class="flex items-center gap-2">

    <!-- Theme Toggle -->
    <button mat-icon-button (click)="toggleTheme()" class="!text-slate-600 dark:!text-slate-300 hover:!text-slate-900 dark:hover:!text-white hover:!bg-slate-100 dark:hover:!bg-slate-800 !transition-colors !duration-200">
      <mat-icon>brightness_4</mat-icon>
    </button>

    <!-- Notifications -->
    <app-notification />

    <!-- User Profile -->
    <app-user />
  </div>

</mat-toolbar>
