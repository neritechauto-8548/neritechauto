<!-- Cabeçalho Moderno com Efeitos Especiais -->
<mat-toolbar class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 !h-16 !px-4 sticky top-0 z-50 flex items-center justify-between">

  <!-- Left: Logo & Toggle -->
  <div class="flex items-center gap-4">
    @if (showToggle) {
      <button mat-icon-button (click)="toggleSidenav.emit()">
        <mat-icon>menu</mat-icon>
      </button>
    }

    <!-- Logo (Visible on Mobile or when Branding hidden in Sidebar) -->
    <div class="flex items-center gap-2" [class.hidden]="!showBranding">
        <div class="flex items-center gap-2 font-inter scale-95 origin-left">
          <div class="w-7 h-7 rounded-lg bg-gradient-to-tr from-violet-500 to-indigo-500 flex items-center justify-center text-white font-black text-xs shadow-md shadow-indigo-500/10">
            N
          </div>
          <span class="font-bold text-[18px] tracking-tight text-slate-900 dark:text-white leading-none">
            NeriTech<span class="text-indigo-500">Auto</span>
          </span>
        </div>
    </div>
  </div>

  <!-- Center: Global Search (Command Bar Style) -->
  <div class="flex-1 px-4 max-w-xl hidden md:block">
    <div class="relative group">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <mat-icon class="text-slate-400 text-[18px] w-[18px] h-[18px]">search</mat-icon>
      </div>
      <input
        type="text"
        class="block w-full pl-9 pr-12 py-1.5 border border-slate-200 rounded-lg leading-5 bg-white/50 text-slate-900 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 sm:text-sm transition-all duration-200"
        placeholder="Buscar e navegar... (Ctrl+K)"
      />
      <div class="absolute inset-y-0 right-0 pr-2 flex items-center pointer-events-none">
        <kbd class="hidden sm:inline-flex items-center px-1.5 py-0.5 rounded border border-slate-200 bg-slate-50 font-sans text-[10px] font-medium text-slate-400 shadow-sm">
          ⌘K
        </kbd>
      </div>
    </div>
  </div>

  <!-- Right: Actions -->
  <div class="flex items-center gap-2">

    <!-- Theme Toggle -->
    <button mat-icon-button (click)="toggleTheme()" class="!text-slate-600 dark:!text-slate-300 hover:!text-slate-900 dark:hover:!text-white hover:!bg-slate-100 dark:hover:!bg-slate-800 !transition-colors !duration-200">
      <mat-icon>brightness_4</mat-icon>
    </button>


    <!-- Notifications -->
    <app-notification />

    <!-- User Profile -->
    <app-user />
  </div>

</mat-toolbar>
