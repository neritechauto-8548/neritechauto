@if (showHeader) {
  <div class="matero-sidebar-header">
    <p-toolbar [styleClass]="(settings.options.menuThemeClass || '!bg-[var(--p-surface-0)] dark:!bg-[var(--p-surface-900)] !text-[var(--p-text-color)]') + ' !border-none !shadow-none !px-4 flex items-center w-full !rounded-none transition-colors duration-200'">
      <app-branding [showName]="!toggleChecked" />

      <span class="flex-fill"></span>

      @if (showToggle) {
        <p-button
          icon="{{ toggleChecked ? 'pi pi-chevron-right' : 'pi pi-bars' }}"
          [text]="true"
          [rounded]="true"
          severity="secondary"
          (click)="toggleCollapsed.emit()"
          [attr.aria-label]="toggleChecked ? 'Expandir menu' : 'Recolher menu'"
          [matTooltip]="toggleChecked ? 'Expandir menu' : 'Recolher menu'"
          matTooltipPosition="below"
        ></p-button>
      } @else {
        <p-button
          icon="pi pi-times"
          [text]="true"
          [rounded]="true"
          severity="secondary"
          (click)="closeSidenav.emit()"
          matTooltip="Fechar"
          matTooltipPosition="below"
        ></p-button>
      }
    </p-toolbar>
  </div>
}

<app-sidemenu></app-sidemenu>
