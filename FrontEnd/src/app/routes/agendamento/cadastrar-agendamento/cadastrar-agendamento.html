<div class="flex flex-col h-full bg-slate-50 relative min-h-screen">
  <p-toast [style]="{top: '90px'}" [baseZIndex]="99999" />

  <!-- Action Bar (Sticky Top) -->
  <div class="bg-white px-6 py-3.5 border-b border-slate-200/60 flex items-center justify-between sticky top-0 z-30 shadow-sm backdrop-blur-sm">
      <div class="flex items-center gap-4">
          <button (click)="cancelar()" class="w-8 h-8 rounded-md hover:bg-slate-100 flex items-center justify-center transition-colors text-slate-600">
              <i class="pi pi-arrow-left text-sm"></i>
          </button>
          <div>
              <h1 class="text-base font-semibold text-slate-900 leading-tight">
                  {{ idAgendamento ? 'Editar Agendamento' : 'Novo Agendamento' }}
              </h1>
              <span class="text-xs text-slate-500 font-normal">
                  {{ idAgendamento ? 'Editando registro #' + idAgendamento : 'Preencha os dados abaixo' }}
              </span>
          </div>
      </div>

      <div class="flex gap-3 items-center">
          @if (idAgendamento) {
            <button *ngxPermissionsOnly="['AGENDAMENTO_EXCLUIR']" (click)="excluirAgendamento()" class="px-3.5 py-1.5 rounded-md border border-rose-200 bg-white text-rose-600 font-medium hover:bg-rose-50 hover:border-rose-300 transition-colors text-sm flex items-center gap-1.5 shadow-sm">
               <i class="pi pi-trash text-[13px]"></i> Excluir
            </button>
            <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
          }
          <button (click)="cancelar()" class="px-3.5 py-2 rounded-md border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition-colors text-sm shadow-sm">
              Cancelar
          </button>
          <button *ngxPermissionsOnly="['AGENDAMENTO_CRIAR', 'AGENDAMENTO_EDITAR']" (click)="salvar()" [disabled]="submitLoad || loading" class="px-3.5 py-2 rounded-md bg-blue-600 text-white font-medium hover:bg-blue-700 shadow-sm transition-colors text-sm flex items-center gap-1.5 disabled:opacity-70 disabled:cursor-not-allowed">
              @if (!submitLoad) { <i class="pi pi-check text-xs"></i> }
              @if (submitLoad) { <i class="pi pi-spin pi-spinner text-xs"></i> }
              {{ submitLoad ? 'Salvando...' : 'Salvar' }}
          </button>
      </div>
  </div>

  <div class="p-6 w-full space-y-8 mx-auto">

      <!-- Loading State -->
      @if (loading) {
      <div class="flex flex-col items-center justify-center py-12">
          <p-skeleton width="100%" height="400px" styleClass="rounded-xl"></p-skeleton>
      </div>
      }

      @if (!loading) {
          <!-- Content Area -->
          <div class="animate-fade-in-up space-y-6">

             <!-- Formulário Unificado com Grid 12 colunas -->
             <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                 <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100">
                     <h3 class="font-bold text-slate-800 text-sm">Informações do Agendamento</h3>
                 </div>
                 
                 <div class="p-6 grid grid-cols-1 lg:grid-cols-12 gap-4">
                     
                     <!-- Cliente (Col 6) -->
                     <div class="lg:col-span-6 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Cliente <span class="text-red-500">*</span></label>
                         <p-select
                            [(ngModel)]="agendamento.clienteId"
                            [options]="clientes"
                            optionLabel="label"
                            optionValue="value"
                            [filter]="true"
                            filterBy="label"
                            (onChange)="onClienteSelecionado()"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Selecione ou busque um cliente" />
                     </div>

                     <!-- Veículo (Col 6) -->
                     <div class="lg:col-span-6 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Veículo</label>
                         <p-select
                            [(ngModel)]="agendamento.veiculoId"
                            [options]="veiculosFiltrados"
                            optionLabel="label"
                            optionValue="value"
                            [disabled]="!agendamento.clienteId || veiculosFiltrados.length === 0"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Selecione um veículo cadastrado" />
                     </div>

                     <!-- Separador -->
                     <div class="lg:col-span-12 border-t border-slate-100 my-2"></div>

                     <!-- Data do Serviço (Col 2) -->
                     <div class="lg:col-span-2 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Data do Serviço <span class="text-red-500">*</span></label>
                         <input type="date" pInputText [(ngModel)]="dataSelecionada" [min]="hojeLimit" class="w-full modern-input text-slate-700" />
                     </div>

                     <!-- Início (Col 2) -->
                     <div class="lg:col-span-2 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Início <span class="text-red-500">*</span></label>
                         <input type="time" pInputText [(ngModel)]="horaInicioSelecionada" class="w-full modern-input text-slate-700" />
                     </div>

                     <!-- Término (Col 2) -->
                     <div class="lg:col-span-2 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Término <span class="text-red-500">*</span></label>
                         <input type="time" pInputText [(ngModel)]="horaFimSelecionada" class="w-full modern-input text-slate-700" />
                     </div>

                     <!-- Canal / Origem (Col 3) -->
                     <div class="lg:col-span-3 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Canal / Origem</label>
                         <p-select
                            [(ngModel)]="agendamento.canalAgendamento"
                            [options]="canaisOptions"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Selecione..." />
                     </div>

                     <!-- Status Atual (Col 3) -->
                     <div class="lg:col-span-3 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Status Atual</label>
                         <p-select
                            [(ngModel)]="agendamento.status"
                            [options]="statusOptions"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Selecione..." />
                     </div>

                     <!-- Separador -->
                     <div class="lg:col-span-12 border-t border-slate-100 my-2"></div>

                     <!-- Problema Relatado (Col 12) -->
                     <div class="lg:col-span-12 space-y-1">
                         <label class="block text-xs font-medium text-slate-700 mb-1.5">Problema Relatado / Serviço a Fazer</label>
                         <textarea pTextarea rows="3" [(ngModel)]="agendamento.problemaRelatado" placeholder="O veículo está falhando ou cliente pediu troca de óleo..." class="w-full modern-input resize-none h-auto"></textarea>
                     </div>

                     <!-- Obs Cliente (Col 6) -->
                     <div class="lg:col-span-6 space-y-1 mt-2">
                         <label class="block text-xs font-medium text-slate-700 mb-1.5">Obs. Cliente (Visíveis na O.S)</label>
                         <textarea pTextarea rows="3" [(ngModel)]="agendamento.observacoesCliente" class="w-full modern-input resize-none h-auto"></textarea>
                     </div>

                     <!-- Obs Interna (Col 6) -->
                     <div class="lg:col-span-6 space-y-1 mt-2">
                         <label class="block text-xs font-medium text-slate-700 mb-1.5">Anotações Internas (Oficina)</label>
                         <textarea pTextarea rows="3" [(ngModel)]="agendamento.observacoesInternas" class="w-full modern-input bg-amber-50/50 resize-none h-auto"></textarea>
                     </div>

                 </div>
             </div>

           </div>
      }
  </div>
</div>
