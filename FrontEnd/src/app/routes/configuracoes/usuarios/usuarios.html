<div class="min-h-screen bg-slate-50">

  <!-- Sticky top bar -->
  <div class="sticky top-0 z-20 bg-white border-b border-slate-200 shadow-sm">
    <div class="flex items-center justify-between px-6 py-3">
      <div>
        <h1 class="text-base font-bold text-slate-900">Usuários do Sistema</h1>
        <p class="text-xs text-slate-500">{{ usuarios.length }} usuário(s) cadastrado(s)</p>
      </div>
      <button (click)="novoUsuario()"
        class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white text-sm font-semibold rounded-lg hover:bg-emerald-700 transition-colors">
        <span class="material-icons text-base">person_add</span>
        Novo Usuário
      </button>
    </div>
  </div>

  <div class="px-6 py-6">
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-slate-50 border-b border-slate-200">
            <th class="text-left px-4 py-3 text-xs font-bold text-slate-600 uppercase tracking-wide">Nome</th>
            <th class="text-left px-4 py-3 text-xs font-bold text-slate-600 uppercase tracking-wide">E-mail</th>
            <th class="text-left px-4 py-3 text-xs font-bold text-slate-600 uppercase tracking-wide">Cargo</th>
            <th class="text-left px-4 py-3 text-xs font-bold text-slate-600 uppercase tracking-wide">Funções</th>
            <th class="text-left px-4 py-3 text-xs font-bold text-slate-600 uppercase tracking-wide">Status</th>
            <th class="text-right px-4 py-3 text-xs font-bold text-slate-600 uppercase tracking-wide">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="loading">
            <td colspan="6" class="px-4 py-10 text-center text-sm text-slate-500">Carregando...</td>
          </tr>
          <tr *ngFor="let u of usuarios" class="border-b border-slate-100 hover:bg-slate-50/50">
            <td class="px-4 py-3 font-semibold text-slate-900">{{ u.nomeCompleto }}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">{{ u.email }}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">{{ u.cargo || '—' }}</td>
            <td class="px-4 py-3">
              <div class="flex flex-wrap gap-1">
                <span *ngFor="let f of u.funcoes" class="inline-flex px-1.5 py-0.5 rounded text-xs bg-purple-50 text-purple-700 font-medium border border-purple-100">
                  {{ f }}
                </span>
                <span *ngIf="!u.funcoes || u.funcoes.length === 0" class="text-xs text-slate-400">Nenhuma</span>
              </div>
            </td>
            <td class="px-4 py-3">
              <span [class]="u.ativo ? 'inline-flex px-2 py-0.5 rounded-full text-xs font-semibold bg-emerald-100 text-emerald-700' : 'inline-flex px-2 py-0.5 rounded-full text-xs font-semibold bg-slate-100 text-slate-600'">
                {{ u.ativo ? 'Ativo' : 'Inativo' }}
              </span>
            </td>
            <td class="px-4 py-3 text-right">
              <div class="flex items-center justify-end gap-1">
                <button (click)="editarUsuario(u.id)"
                  class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-blue-50 hover:text-blue-600 text-slate-400 transition-colors">
                  <span class="material-icons text-base">edit</span>
                </button>
                <button (click)="excluirUsuario(u.id)"
                  class="flex items-center justify-center w-8 h-8 rounded-lg hover:bg-red-50 hover:text-red-600 text-slate-400 transition-colors">
                  <span class="material-icons text-base">delete_outline</span>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="!loading && usuarios.length === 0">
            <td colspan="6" class="px-4 py-12 text-center text-sm text-slate-500">
              <span class="material-icons text-4xl text-slate-300 block mb-2">manage_accounts</span>
              Nenhum usuário encontrado
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
