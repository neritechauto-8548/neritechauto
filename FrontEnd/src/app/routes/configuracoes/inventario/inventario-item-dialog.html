<div class="p-3 flex flex-col gap-3">
  <!-- Content -->
  <div class="grid grid-cols-1 md:grid-cols-12 gap-3">

      <!-- Linha 1 -->
      <div class="md:col-span-3 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Código <span class="text-rose-500">*</span></label>
        <input pInputText [(ngModel)]="form.codigo" placeholder="Ex: INV-001"
               class="modern-input w-full !text-xs !py-2" />
      </div>

      <div class="md:col-span-6 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Descrição <span class="text-rose-500">*</span></label>
        <input pInputText [(ngModel)]="form.descricao" placeholder="Ex: Inventário Mensal"
               class="modern-input w-full !text-xs !py-2" />
      </div>

      <div class="md:col-span-3 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Tipo</label>
        <p-select [options]="tipoOptions" [(ngModel)]="form.tipoInventario" name="tipo"
                  styleClass="w-full modern-select !text-xs"
                  appendTo="body" />
      </div>

      <!-- Linha 2 -->
      <div class="md:col-span-4 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Data de Início <span class="text-rose-500">*</span></label>
        <input pInputText type="date" [(ngModel)]="form.dataInicio"
               class="modern-input w-full uppercase !text-xs !py-2" />
      </div>

      <div class="md:col-span-4 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Data Fim</label>
        <input pInputText type="date" [(ngModel)]="form.dataFim"
               class="modern-input w-full uppercase !text-xs !py-2" />
      </div>

      <div class="md:col-span-4 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Status</label>
        <p-select [options]="statusOptions" [(ngModel)]="form.status" name="status"
                  styleClass="w-full modern-select !text-xs"
                  appendTo="body" />
      </div>

      <!-- Linha 3 -->
      <div class="md:col-span-12 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Observações Extras</label>
        <textarea pTextarea [(ngModel)]="form.observacoes" rows="1" class="modern-input w-full resize-none !text-xs !py-2" placeholder="Qualquer nota ou justificativa para este inventário..."></textarea>
      </div>

    </div>

  <!-- Footer Actions -->
  <div class="flex justify-end gap-2 pt-2 border-t border-slate-100 mt-1">
    <button (click)="cancelar()" class="px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition-all active:scale-95 border border-slate-200 bg-white">
      Cancelar
    </button>
    <button (click)="adicionar()" [disabled]="!form.codigo || !form.descricao || !form.dataInicio" class="px-4 py-2 text-xs font-semibold bg-[#635bff] hover:bg-[#5851eb] text-white rounded-lg shadow-sm shadow-blue-200 transition-all flex items-center gap-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed border-0">
      <mat-icon class="!text-[16px] !w-[16px] !h-[16px]">{{ isEdit ? 'save' : 'check' }}</mat-icon>
      <span>{{ isEdit ? 'Salvar Alterações' : 'Confirmar Cadastro' }}</span>
    </button>
  </div>
</div>
