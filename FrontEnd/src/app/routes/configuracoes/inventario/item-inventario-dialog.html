<div class="p-3 flex flex-col gap-3">
  <!-- Content -->
  <div class="grid grid-cols-1 md:grid-cols-12 gap-3">

      <!-- Linha 1: Identificação Peça / Local / Lote -->
      <div class="md:col-span-5 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Peça / Serviço (ID) <span class="text-rose-500">*</span></label>
        <div class="relative w-full">
          <mat-icon class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 !text-[16px] !w-[16px] !h-[16px] pointer-events-none">build</mat-icon>
          <p-select [options]="produtos" [(ngModel)]="form.produtoId" optionLabel="nome" optionValue="id" styleClass="w-full modern-select !pl-8 !text-xs" placeholder="Selecione..." [filter]="true" filterBy="nome,codigoInterno" appendTo="body" autofocus />
        </div>
      </div>

      <div class="md:col-span-4 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Prateleira (ID)</label>
        <div class="relative w-full">
          <mat-icon class="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-400 !text-[16px] !w-[16px] !h-[16px] pointer-events-none">shelves</mat-icon>
          <p-select [options]="localizacoes" [(ngModel)]="form.localizacaoId" optionLabel="descricao" optionValue="id" styleClass="w-full modern-select !pl-8 !text-xs" placeholder="Nenhuma (Opcional)" [filter]="true" filterBy="descricao" [showClear]="true" appendTo="body" />
        </div>
      </div>

      <div class="md:col-span-3 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Nº Lote</label>
        <input type="text" pInputText [(ngModel)]="form.loteNumero" class="modern-input w-full !text-xs !py-2" placeholder="Ex: LT-24" />
      </div>

      <!-- Linha 2 -->
      <div class="md:col-span-3 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest" title="Qtd. Teórica">Qtd. Sist.</label>
        <input type="number" pInputText [(ngModel)]="form.quantidadeSistema" class="modern-input w-full bg-slate-50 font-bold !text-xs !py-2" readonly />
      </div>

      <div class="md:col-span-3 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-indigo-600">Qtd. Contada <span class="text-rose-500">*</span></label>
        <input type="number" pInputText [(ngModel)]="form.quantidadeContada" class="modern-input w-full border-[#635bff] bg-indigo-50/10 font-bold !text-xs !py-2" placeholder="Contagem..." />
      </div>

      <div class="md:col-span-3 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">V. Unitário (R$)</label>
        <input type="number" pInputText [(ngModel)]="form.valorUnitario" class="modern-input w-full !text-xs !py-2" placeholder="0.00" />
      </div>

      <div class="md:col-span-3 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Status</label>
        <p-select [options]="statusOptions" [(ngModel)]="form.status" styleClass="w-full modern-select !text-xs" appendTo="body" />
      </div>

      <!-- Linha 3: Divergência e Observações -->
      <div class="md:col-span-6 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-rose-500 uppercase tracking-widest">Motivo (Divergência)</label>
        <input type="text" pInputText [(ngModel)]="form.motivoDiferenca" class="modern-input w-full !text-xs !py-2" placeholder="Ex: Peça extraviada..." />
      </div>

      <div class="md:col-span-6 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Observações</label>
        <textarea pTextarea [(ngModel)]="form.observacoes" rows="1" class="modern-input w-full resize-none !text-xs !py-2"></textarea>
      </div>

      <!-- Linha 4: Audit -->
      <div class="md:col-span-4 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mecânico (ID)</label>
        <input type="number" pInputText [(ngModel)]="form.usuarioContagem" class="modern-input w-full !text-xs !py-1.5" />
      </div>

      <div class="md:col-span-4 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Auditor (ID)</label>
        <input type="number" pInputText [(ngModel)]="form.usuarioConferencia" class="modern-input w-full !text-xs !py-1.5" />
      </div>

      <div class="md:col-span-4 flex flex-col gap-1">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Anexo (URL)</label>
        <input type="text" pInputText [(ngModel)]="form.fotoComprovanteUrl" class="modern-input w-full !text-xs !py-1.5" placeholder="Link da foto..." />
      </div>

    </div>

  <!-- Footer Actions -->
  <div class="flex justify-between items-center pt-2 border-t border-slate-100 mt-1">
    <button (click)="cancelar()" class="px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition-all active:scale-95 border border-slate-200 bg-white">
      Cancelar
    </button>
    <div class="flex items-center gap-2">
      <button (click)="salvar(false)" [disabled]="!form.produtoId || form.quantidadeContada === null" class="px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition-all active:scale-95 border border-slate-200 bg-white shadow-sm flex items-center gap-1 disabled:opacity-50">
        <mat-icon class="!text-[16px] !w-[16px] !h-[16px]">save</mat-icon>
        Salvar/Fechar
      </button>
      <button (click)="salvar(true)" [disabled]="!form.produtoId || form.quantidadeContada === null" class="px-4 py-2 text-xs font-semibold bg-[#635bff] hover:bg-[#5851eb] text-white rounded-lg shadow-sm shadow-blue-200 transition-all flex items-center gap-1 active:scale-95 disabled:opacity-50 border-0">
        <mat-icon class="!text-[16px] !w-[16px] !h-[16px]">add</mat-icon>
        Adicionar Outro
      </button>
    </div>
  </div>
</div>
