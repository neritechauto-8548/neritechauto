<div class="p-4">
  <div class="grid grid-cols-1 md:grid-cols-12 gap-4">

    <div class="md:col-span-12 flex flex-col gap-1.5">
      <label for="descricao" class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Descrição <span class="text-red-500">*</span></label>
      <input id="descricao" type="text" pInputText [(ngModel)]="descricao" class="w-full text-sm px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none" placeholder="Ex: Galpão A, Escritório Central..." />
    </div>

  </div>

  <!-- Footer Actions -->
  <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-slate-100">
    <button (click)="cancelar()"
            class="px-5 py-2 rounded-lg text-sm font-bold text-slate-600 border border-slate-300 hover:bg-slate-50 transition-colors">
      Cancelar
    </button>
    <button (click)="salvar()"
            class="px-5 py-2 rounded-lg text-sm font-bold text-white bg-[#635bff] hover:bg-[#5851eb] transition-colors shadow-sm flex items-center gap-2 active:scale-95">
      <i class="pi pi-check text-xs"></i> Salvar
    </button>
  </div>
</div>
