<div class="px-2 py-2 flex flex-col gap-6">
  <!-- Content Grid -->
  <div class="space-y-4">
  <div class="flex flex-col gap-1.5">
    <label class="text-sm font-semibold text-slate-700">Nome do Setor <span class="text-red-500">*</span></label>
    <input
      pInputText
      [(ngModel)]="form.nome"
      placeholder="Ex: Comercial, Financeiro, RH"
      class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all text-sm"
    />
  </div>

  <div class="flex items-center gap-3 bg-slate-50/50 p-3 rounded-lg border border-slate-100 mt-2">
    <p-checkbox [(ngModel)]="form.ativo" [binary]="true" inputId="ativo" />
    <label for="ativo" class="text-sm font-medium text-slate-600 cursor-pointer select-none">Ativo para uso no sistema</label>
  </div>

  <div class="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-100">
    <button
      (click)="cancelar()"
      class="px-5 py-2.5 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:text-slate-900 transition-colors active:scale-95"
    >
      Cancelar
    </button>
    <button
      (click)="adicionar()"
      [disabled]="!form.nome"
      class="px-5 py-2.5 text-sm font-medium text-white bg-[#635bff] border border-transparent rounded-lg hover:bg-[#5851eb] transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-sm flex items-center gap-2 active:scale-95"
    >
      Salvar
    </button>
  </div>
</div>
