<p-toast [style]="{top: '90px'}" [baseZIndex]="99999" />
<app-confirmation-dialog />

<div class="flex flex-col h-full gap-4">
  <!-- Actions Bar -->
  <div class="flex flex-row justify-end items-center mb-2">
    <button (click)="novoChecklist()" class="bg-[#635bff] hover:bg-[#5851eb] text-white font-medium py-2 px-4 rounded-lg shadow-sm transition-all flex items-center gap-2 text-sm whitespace-nowrap active:scale-95">
      <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">add</mat-icon>
      <span>Novo Checklist</span>
    </button>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="flex justify-center p-12">
    <i class="pi pi-spin pi-spinner text-blue-500 text-3xl"></i>
  </div>

  <!-- Checklist Accordion -->
  <p-accordion [multiple]="true" class="modern-accordion" *ngIf="!loading">
    <p-accordion-panel *ngFor="let modelo of modelos; index as i" [value]="i.toString()" (onToggle)="abrir(i)" class="mb-3 overflow-hidden border border-slate-200 rounded-xl shadow-sm bg-white ring-1 ring-slate-100">
      <p-accordion-header>
        <div class="flex items-center justify-between w-full px-2">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg flex items-center justify-center bg-slate-50 text-slate-500 border border-slate-100 shadow-inner group-hover:bg-blue-50 group-hover:text-blue-600 transition-all duration-300">
              <mat-icon class="!text-[20px] !w-[20px] !h-[20px]">assignment</mat-icon>
            </div>
            <div class="flex flex-col">
              <span class="font-bold text-slate-800 text-sm group-hover:text-blue-600 transition-colors">{{ modelo.titulo }}</span>
              <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{{ modelo.itens.length }} Itens cadastrados</span>
            </div>
          </div>

          <div class="flex items-center gap-1 mr-4" (click)="$event.stopPropagation()">
            <button (click)="adicionarItem(i)" title="Adicionar Item" class="w-8 h-8 flex items-center justify-center rounded-lg text-emerald-500 hover:bg-emerald-50 transition-all active:scale-90">
              <mat-icon class="!text-[20px] !w-[20px] !h-[20px]">add_circle_outline</mat-icon>
            </button>
            <button (click)="editarModelo(i)" title="Editar Checklist" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-blue-600 hover:bg-slate-50 transition-all active:scale-90">
              <mat-icon class="!text-[20px] !w-[20px] !h-[20px]">edit</mat-icon>
            </button>
            <button (click)="removerModelo(i)" title="Remover Checklist" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-500 hover:bg-red-50 transition-all active:scale-90">
              <mat-icon class="!text-[20px] !w-[20px] !h-[20px]">delete_outline</mat-icon>
            </button>
          </div>
        </div>
      </p-accordion-header>

      <p-accordion-content>
        <div class="flex flex-col bg-slate-50/30 rounded-lg border border-slate-100 overflow-hidden divide-y divide-slate-100">
          <!-- Item Row -->
          <div *ngFor="let item of modelo.itens; index as j" class="group/item flex items-center justify-between py-3 px-6 hover:bg-white transition-all cursor-default">
            <div class="flex items-center gap-4">
              <div class="w-6 h-6 rounded-md bg-white border border-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-400 group-hover/item:border-blue-400 group-hover/item:text-blue-600 transition-all">
                {{ j + 1 }}
              </div>
              <span class="text-sm font-medium text-slate-700 group-hover/item:text-slate-900 transition-colors">{{ getItemText(item) }}</span>
            </div>

            <div class="flex items-center gap-1 opacity-0 group-hover/item:opacity-100 transition-opacity">
              <button (click)="editarItem(i, j)" title="Editar" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-blue-600 hover:bg-white border border-transparent hover:border-slate-200 shadow-sm transition-all active:scale-90">
                <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">edit</mat-icon>
              </button>
              <button (click)="removerItem(i, j)" title="Remover" class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-red-500 hover:bg-white border border-transparent hover:border-slate-200 shadow-sm transition-all active:scale-90">
                <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">close</mat-icon>
              </button>
            </div>
          </div>

          <!-- Empty State within Checklist -->
          <div *ngIf="modelo.itens.length === 0 && !modelo.loading" class="py-10 text-center flex flex-col items-center gap-2">
             <mat-icon class="text-slate-200 !text-[40px] !w-[40px] !h-[40px]">playlist_add</mat-icon>
             <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Nenhum item cadastrado</p>
             <button (click)="adicionarItem(i)" class="text-xs text-blue-600 font-bold hover:text-blue-800 transition-colors uppercase tracking-tight">Adicionar primeiro item</button>
          </div>

          <!-- Loading Items -->
          <div *ngIf="modelo.loading" class="py-10 text-center">
            <i class="pi pi-spin pi-spinner text-blue-400"></i>
          </div>
        </div>
      </p-accordion-content>
    </p-accordion-panel>
  </p-accordion>

  <!-- Empty State (No Models) -->
  <div *ngIf="modelos.length === 0 && !loading" class="flex-1 flex flex-col items-center justify-center py-20 bg-white border border-dashed border-slate-300 rounded-2xl gap-4">
    <div class="w-20 h-20 rounded-3xl bg-slate-50 flex items-center justify-center border border-slate-100 shadow-inner">
       <mat-icon class="!text-[40px] !w-[40px] !h-[40px] text-slate-300">inventory</mat-icon>
    </div>
    <div class="text-center">
      <h3 class="text-lg font-bold text-slate-800">Nenhum modelo de checklist</h3>
      <p class="text-sm text-slate-500 max-w-xs mx-auto">Crie modelos de checklist para padronizar o processo de verificação da sua empresa.</p>
    </div>
    <button (click)="novoChecklist()" class="bg-[#635bff] hover:bg-[#5851eb] text-white font-medium py-2 px-6 rounded-lg shadow-sm transition-all flex items-center gap-2 text-sm active:scale-95">
      <mat-icon>add</mat-icon>
      <span>Começar agora</span>
    </button>
  </div>
</div>
