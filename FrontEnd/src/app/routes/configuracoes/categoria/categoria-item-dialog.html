<div class="px-2 py-2 flex flex-col gap-6">
  <!-- Content Grid -->
  <div class="space-y-4">
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-slate-700 tracking-tight uppercase">Nome da Categoria</label>
      <input
        pInputText
        [(ngModel)]="form.nome"
        class="modern-input"
        placeholder="Ex: Peças, Acessórios..."
       
      />
    </div>

    <!-- Status -->
    <div class="flex items-center gap-3 bg-slate-50/50 p-3 rounded-lg border border-slate-100">
      <p-checkbox [(ngModel)]="form.ativo" [binary]="true" inputId="ativo" />
      <label for="ativo" class="text-sm font-medium text-slate-600 cursor-pointer select-none">Ativo para uso no sistema</label>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
    <button (click)="cancelar()" class="px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition-all active:scale-95">
      Cancelar
    </button>
    <button (click)="adicionar()" class="px-5 py-2.5 text-sm font-semibold bg-[#635bff] hover:bg-[#5851eb] text-white rounded-lg shadow-sm shadow-blue-200 transition-all flex items-center gap-2 active:scale-95">
      <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">check</mat-icon>
      {{ form.id ? 'Salvar Alterações' : 'Confirmar Cadastro' }}
    </button>
  </div>
</div>
