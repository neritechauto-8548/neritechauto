<div class="p-3">
  <div class="p-fluid p-formgrid p-grid">
    <div class="p-field p-col-12 p-md-6">
      <label for="nome">Nome da Forma de Pagamento</label>
      <input id="nome" type="text" pInputText [(ngModel)]="nome" />
    </div>
    <div class="p-field p-col-6 p-md-3">
      <label for="tipo">Tipo</label>
      <p-select [(ngModel)]="tipoPagamento" [options]="tipoOptions" inputId="tipo" />
    </div>
    <div class="p-field p-col-6 p-md-3">
      <label for="lancar">Lancar Aut.</label>
      <p-select [(ngModel)]="lancarAutomatico" [options]="simNaoOptions" inputId="lancar" />
    </div>
    <div class="p-field p-col-12 p-md-3">
      <label for="atualizacao">Atualizacao</label>
      <input id="atualizacao" type="text" pInputText placeholder="dd/MM/yyyy" [(ngModel)]="atualizadoEmText" />
    </div>
  </div>

  <!-- PIX -->
  <div *ngIf="tipoPagamento === 'PIX'" class="mt-3">
    <h3 class="text-lg mb-2">Pagamento por PIX</h3>
    <div class="p-fluid p-formgrid p-grid">
      <div class="p-field p-col-12 p-md-4">
        <label>Taxa</label>
        <input type="number" pInputText [(ngModel)]="pix.taxaPercent" />
      </div>
      <div class="p-field p-col-12 p-md-4">
        <label>Valor por Transacao</label>
        <input type="number" pInputText [(ngModel)]="pix.valorPorTransacao" />
      </div>
      <div class="p-field p-col-12 p-md-4">
        <label>Dias para Recebimento</label>
        <input type="number" pInputText [(ngModel)]="pix.diasRecebimento" />
      </div>
    </div>
  </div>

  <!-- Cartão de crédito: 1..24 meses -->
  <div *ngIf="tipoPagamento === 'Cartão'" class="mt-3">
    <h3 class="text-lg mb-2">Pagamento por Cartão de Crédito</h3>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
      <div *ngFor="let taxa of cartao.taxasPorMes; let i = index" class="bg-white p-2 rounded border">
        <label class="block text-sm mb-1">Mes {{ i + 1 }}</label>
        <input type="number" pInputText [(ngModel)]="cartao.taxasPorMes[i]" />
      </div>
    </div>
  </div>

  <!-- Outros tipos: genérico -->
  <div *ngIf="tipoPagamento !== 'PIX' && tipoPagamento !== 'Cartão'" class="mt-3">
    <h3 class="text-lg mb-2">Taxa</h3>
    <div class="p-field">
      <input type="number" pInputText [(ngModel)]="outros.taxaPercent" />
    </div>
  </div>

  <div class="flex justify-end gap-2 mt-4">
    <button pButton type="button" label="Fechar" class="p-button-secondary" (click)="fechar()"></button>
    <button pButton type="button" label="Salvar" icon="pi pi-check" (click)="salvar()"></button>
  </div>
</div>
