<div class="px-2 py-2 flex flex-col gap-6">
  <!-- Content Grid -->
  <div class="space-y-4">
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-slate-700 tracking-tight uppercase">Situação <span class="text-red-500">*</span></label>
      <input
        name="nmSituacao"
        pInputText
        [(ngModel)]="form.nmSituacao"
        class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all text-sm"
        placeholder="Ex.: REALIZANDO SERVIÇO"
       
      />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-slate-700 tracking-tight uppercase">Breve explicação</label>
      <input
        name="dsSituacao"
        pInputText
        [(ngModel)]="form.dsSituacao"
        class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all text-sm"
        placeholder="Ex.: Serviço sendo feito pela oficina"
      />
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-slate-700 tracking-tight uppercase">Cor da bandeira</label>
      <div class="flex items-center gap-3 bg-slate-50/50 p-2.5 rounded-lg border border-slate-100">
        <p-colorpicker [(ngModel)]="form.corSituacao" format="hex" appendTo="body" />
        <span class="text-xs font-mono text-slate-500 bg-white px-2 py-1 rounded border border-slate-200 min-w-[65px] text-center uppercase shadow-sm">{{ form.corSituacao || '#000000' }}</span>
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="flex justify-end gap-3 pt-4 border-t border-slate-100">
    <button
      (click)="cancelar()"
      class="px-5 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 rounded-lg transition-all active:scale-95 border border-slate-200 bg-white">
      Cancelar
    </button>
    <button
      (click)="salvar()"
      [disabled]="!form.nmSituacao"
      class="px-5 py-2.5 text-sm font-semibold bg-[#635bff] hover:bg-[#5851eb] text-white rounded-lg shadow-sm shadow-blue-200 transition-all flex items-center gap-2 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed border-0">
      <mat-icon class="!text-[18px] !w-[18px] !h-[18px]">check</mat-icon>
      <span>{{ isEdit ? 'Salvar Alterações' : 'Confirmar Cadastro' }}</span>
    </button>
  </div>
</div>
