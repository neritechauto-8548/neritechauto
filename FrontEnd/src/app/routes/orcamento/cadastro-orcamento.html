<div class="flex flex-col h-full bg-slate-50 relative min-h-screen">
  <p-toast [style]="{top: '90px'}" [baseZIndex]="99999" />

  <!-- Action Bar (Sticky Top) — idêntico ao cadastro-veiculo -->
  <div class="bg-white px-6 py-3.5 border-b border-slate-200/60 flex items-center justify-between sticky top-0 z-30 shadow-sm backdrop-blur-sm">
    <div class="flex items-center gap-4">
      <button (click)="cancelar()" class="w-8 h-8 rounded-md hover:bg-slate-100 flex items-center justify-center transition-colors text-slate-600">
        <i class="pi pi-arrow-left text-sm"></i>
      </button>
      <div>
        <h1 class="text-base font-semibold text-slate-900 leading-tight">
          {{ id ? 'Editar Orçamento' : 'Novo Orçamento' }}
        </h1>
        <span class="text-xs text-slate-500 font-normal">
          {{ id ? 'Editando registro #' + id : 'Preencha os dados abaixo' }}
        </span>
      </div>
    </div>

    <div class="flex gap-3 items-center">
      <button *ngIf="id" (click)="excluir()" class="px-3.5 py-1.5 rounded-md border border-rose-200 bg-white text-rose-600 font-medium hover:bg-rose-50 hover:border-rose-300 transition-colors text-sm flex items-center gap-1.5 shadow-sm">
        <i class="pi pi-trash text-[13px]"></i> Excluir
      </button>
      <div *ngIf="id" class="h-6 w-px bg-slate-200 hidden sm:block"></div>
      <button (click)="cancelar()" class="px-3.5 py-2 rounded-md border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition-colors text-sm shadow-sm">
        Cancelar
      </button>
      <button (click)="salvar()" [disabled]="saving" class="px-3.5 py-2 rounded-md bg-blue-600 text-white font-medium hover:bg-blue-700 shadow-sm transition-colors text-sm flex items-center gap-1.5 disabled:opacity-70 disabled:cursor-not-allowed">
        <i class="pi pi-check text-xs" *ngIf="!saving"></i>
        <i class="pi pi-spin pi-spinner text-xs" *ngIf="saving"></i>
        {{ saving ? 'Salvando...' : 'Salvar' }}
      </button>
    </div>
  </div>

  <div class="p-6 w-full space-y-8 mx-auto">

    <!-- Loading State -->
    <div *ngIf="loading" class="flex flex-col items-center justify-center py-12">
      <i class="pi pi-spin pi-spinner text-3xl text-blue-500 mb-3"></i>
      <p class="text-slate-500 text-sm">Carregando dados do orçamento...</p>
    </div>

    <ng-container *ngIf="!loading">
      <div class="animate-fade-in-up space-y-6">

        <!-- Seção: Responsável e Cliente -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100">
            <h3 class="font-bold text-slate-800 text-sm">Responsável e Cliente</h3>
          </div>
          <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- Funcionário -->
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">Funcionário</label>
              <p-select [options]="funcionarios" optionLabel="label" optionValue="value"
                [(ngModel)]="form.funcionario" styleClass="w-full modern-select" placeholder="Selecione..." />
            </div>

            <!-- Cliente Autocomplete -->
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">Cliente</label>
              <p-autoComplete
                [(ngModel)]="selectedCliente"
                [suggestions]="filteredClientes"
                (completeMethod)="searchCliente($event)"
                optionLabel="nome"
                dataKey="id"
                placeholder="Busque por nome ou CPF/CNPJ..."
                styleClass="w-full modern-autocomplete"
                inputStyleClass="w-full modern-input"
                [forceSelection]="true"
                [dropdown]="true">
                <ng-template let-cliente pTemplate="item">
                  <div class="flex flex-col py-1">
                    <span class="font-bold text-sm text-slate-900">{{ cliente.nome }}</span>
                    <span class="text-xs text-slate-500">{{ cliente.cpfCnpj }}</span>
                  </div>
                </ng-template>
              </p-autoComplete>
            </div>

            <!-- Email -->
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">E-mail</label>
              <input pInputText [(ngModel)]="form.email" type="email"
                placeholder="cliente@email.com" class="w-full modern-input" />
            </div>

            <!-- Celular -->
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">Celular com DDD</label>
              <input pInputText [(ngModel)]="form.celular"
                placeholder="(00) 00000-0000" class="w-full modern-input" />
            </div>
          </div>
        </div>

        <!-- Seção: Veículo e Datas -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100">
            <h3 class="font-bold text-slate-800 text-sm">Veículo e Datas</h3>
          </div>
          <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Veículo -->
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">Veículo</label>
              <input pInputText [(ngModel)]="form.veiculo"
                placeholder="Placa ou modelo" class="w-full modern-input" />
            </div>

            <!-- Emissão -->
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">Emissão</label>
              <input pInputText type="date" [(ngModel)]="form.emissao" class="w-full modern-input" />
            </div>

            <!-- Validade -->
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">Validade</label>
              <input pInputText type="date" [(ngModel)]="form.validade" class="w-full modern-input" />
            </div>
          </div>
        </div>

        <!-- Seção: Descrição -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100">
            <h3 class="font-bold text-slate-800 text-sm">Descrição</h3>
          </div>
          <div class="p-6">
            <div class="space-y-1">
              <label class="text-xs font-bold text-slate-700">Observação (opcional)</label>
              <textarea pTextarea [(ngModel)]="form.descricao" rows="5"
                placeholder="Descreva o serviço ou problema relatado..."
                class="w-full modern-input"></textarea>
            </div>
          </div>
        </div>

      </div>
    </ng-container>
  </div>
</div>
