<div class="bg-white dark:bg-gray-900">
  <div class="flex min-h-screen w-screen">
    <div
      class="hidden bg-cover lg:block lg:w-2/3"
      style="background-image: url('/images/login.png')"
    >
      <div class="flex items-center h-full px-20 bg-gray-900 bg-opacity-40">
        <div>
          <h2 class="text-4xl font-bold text-white">Quase lá!</h2>
          <p class="max-w-xl mt-3 text-gray-300">
             Defina sua nova senha com segurança e retome o controle da sua oficina.
          </p>
        </div>
      </div>
    </div>

    <div class="flex items-center w-full max-w-md px-6 mx-auto lg:w-2/6">
      <div class="flex-1">
        <div class="text-center">
          <h2 class="text-[28px] font-bold text-center text-slate-800 tracking-tight dark:text-white">Redefinir Senha</h2>
          <p class="mt-2 text-[13px] font-medium text-slate-500 dark:text-gray-300">
            Escolha uma senha forte para garantir a segurança dos seus dados.
          </p>
        </div>

        <div class="mt-8">
          <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" class="space-y-4">
            <div>
              <label for="password" class="block mb-1.5 text-[13px] font-semibold text-slate-700 dark:text-gray-200">Nova Senha</label>
              <input
                type="password"
                id="password"
                placeholder="••••••"
                formControlName="password"
                class="block w-full h-10 px-3 py-2 text-[14px] text-slate-800 placeholder-slate-400 bg-white border border-slate-300 rounded-md dark:placeholder-gray-600 dark:bg-gray-900 dark:text-gray-300 dark:border-gray-700 transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none shadow-sm"
              />
              <p *ngIf="password.errors?.['required'] && password.touched" class="text-xs text-red-500 mt-1">A senha é obrigatória.</p>
              <p *ngIf="password.errors?.['minlength'] && password.touched" class="text-xs text-red-500 mt-1">A senha deve ter no mínimo 6 caracteres.</p>
            </div>

            <div>
              <label for="confirmPassword" class="block mb-1.5 text-[13px] font-semibold text-slate-700 dark:text-gray-200">Confirmar Nova Senha</label>
              <input
                type="password"
                id="confirmPassword"
                placeholder="••••••"
                formControlName="confirmPassword"
                class="block w-full h-10 px-3 py-2 text-[14px] text-slate-800 placeholder-slate-400 bg-white border border-slate-300 rounded-md dark:placeholder-gray-600 dark:bg-gray-900 dark:text-gray-300 dark:border-gray-700 transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none shadow-sm"
              />
              <p *ngIf="resetForm.errors?.['mismatch'] && confirmPassword.touched" class="text-xs text-red-500 mt-1">As senhas não coincidem.</p>
            </div>

            <div class="mt-6 pt-2">
              <button
                type="submit"
                [disabled]="resetForm.invalid || isSubmitting"
                class="w-full flex justify-center items-center h-10 px-4 py-2 text-[14px] font-semibold tracking-wide text-white transition-all transform bg-[#635BFF] rounded-md hover:bg-[#5851E5] focus:outline-none disabled:bg-indigo-300 shadow-sm"
              >
                <span *ngIf="!isSubmitting">Atualizar Senha</span>
                <span *ngIf="isSubmitting"><i class="pi pi-spinner pi-spin"></i></span>
              </button>
            </div>
          </form>

          <p class="mt-6 text-[13px] text-center font-medium text-slate-500">
             <a routerLink="/auth/login" class="text-blue-600 font-semibold focus:outline-none focus:underline hover:underline transition-colors">Voltar para o login</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
