<div class="bg-white dark:bg-gray-900">
  <div class="flex min-h-screen w-screen">
    <div
      class="hidden bg-cover lg:block lg:w-2/3"
      style="background-image: url('/images/login.png')"
    >
      <div class="flex items-center h-full px-20 bg-gray-900 bg-opacity-40">
        <div>
          <h2 class="text-4xl font-bold text-white">Simplifique a gestão da sua oficina.</h2>
          <p class="max-w-xl mt-3 text-gray-300">
             Com a NeriTechAuto, você otimiza o dia a dia do seu negócio e foca no que realmente importa: atender bem e lucrar mais.
          </p>
        </div>
      </div>
    </div>

    <div class="flex items-center w-full max-w-md px-6 mx-auto lg:w-2/6">
      <div class="flex-1">
        <div class="text-center">
          <h2 class="text-[28px] font-bold text-center text-slate-800 tracking-tight dark:text-white">NeriTechAuto</h2>
          <p class="mt-2 text-[13px] font-medium text-slate-500 dark:text-gray-300">Faça login para acessar sua conta</p>
        </div>

        <div class="mt-8">
          <form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-4">
            <div>
              <label for="email" class="block mb-1.5 text-[13px] font-semibold text-slate-700 dark:text-gray-200">Endereço de e-mail</label>
              <input
                type="email"
                name="email"
                id="email"
                placeholder="seu@oficina.com.br"
                formControlName="username"
                class="block w-full h-10 px-3 py-2 text-[14px] text-slate-800 placeholder-slate-400 bg-white border border-slate-300 rounded-md dark:placeholder-gray-600 dark:bg-gray-900 dark:text-gray-300 dark:border-gray-700 transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none shadow-sm"
              />
            </div>

            <div class="mt-6">
              <div class="flex justify-between mb-1.5 items-center">
                <label for="password" class="text-[13px] font-semibold text-slate-700 dark:text-gray-200">Senha</label>
                <a routerLink="/auth/recover" class="text-[12px] font-semibold text-blue-600 focus:text-blue-700 hover:text-blue-700 hover:underline transition-colors">Esqueceu a senha?</a>
              </div>

              <div class="relative">
                <input
                  [type]="showPassword ? 'text' : 'password'"
                  name="password"
                  id="password"
                  placeholder="••••••"
                  formControlName="password"
                  class="block w-full h-10 px-3 pr-10 py-2 text-[14px] text-slate-800 placeholder-slate-400 bg-white border border-slate-300 rounded-md dark:placeholder-gray-600 dark:bg-gray-900 dark:text-gray-300 dark:border-gray-700 transition-all focus:border-blue-500 focus:ring-1 focus:ring-blue-500 focus:outline-none shadow-sm"
                />
                <button
                  type="button"
                  (click)="togglePasswordVisibility()"
                  class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 hover:text-slate-600 transition-colors"
                  [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Ver senha'"
                >
                  <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'" class="text-sm"></i>
                </button>
              </div>
            </div>

            <div class="mt-6 pt-2">
              <button
                type="submit"
                [disabled]="!!loginForm.invalid || isSubmitting"
                class="w-full flex justify-center items-center h-10 px-4 py-2 text-[14px] font-semibold tracking-wide text-white transition-all transform bg-[#635BFF] rounded-md hover:bg-[#5851E5] focus:outline-none disabled:bg-indigo-300 shadow-sm"
              >
                <span *ngIf="!isSubmitting">Entrar</span>
                <span *ngIf="isSubmitting"><i class="pi pi-spinner pi-spin"></i></span>
              </button>
            </div>
          </form>

          <p class="mt-6 text-[13px] text-center font-medium text-slate-500">
            Ainda não tem uma conta?
         <!--  <a routerLink="/auth/register" class="text-blue-600 font-semibold focus:outline-none focus:underline hover:underline">Cadastre-se</a>.  -->
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
