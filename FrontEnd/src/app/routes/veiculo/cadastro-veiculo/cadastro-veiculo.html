<div class="flex flex-col h-full bg-slate-50 relative min-h-screen">
  <p-toast [style]="{top: '90px'}" [baseZIndex]="99999" />

  <!-- Action Bar (Sticky Top) -->
  <div class="bg-white px-6 py-3.5 border-b border-slate-200/60 flex items-center justify-between sticky top-0 z-30 shadow-sm backdrop-blur-sm">
      <div class="flex items-center gap-4">
          <button (click)="cancelar()" class="w-8 h-8 rounded-md hover:bg-slate-100 flex items-center justify-center transition-colors text-slate-600">
              <i class="pi pi-arrow-left text-sm"></i>
          </button>
          <div>
              <h1 class="text-base font-semibold text-slate-900 leading-tight">
                  {{ id ? 'Editar Veículo' : 'Novo Veículo' }}
              </h1>
              <span class="text-xs text-slate-500 font-normal">
                  {{ id ? 'Editando registro #' + id : 'Preencha os dados abaixo' }}
              </span>
          </div>
      </div>

      <div class="flex gap-3 items-center">
          @if (id) {
              <button (click)="excluirVeiculo()" class="px-3.5 py-1.5 rounded-md border border-rose-200 bg-white text-rose-600 font-medium hover:bg-rose-50 hover:border-rose-300 transition-colors text-sm flex items-center gap-1.5 shadow-sm">
                 <i class="pi pi-trash text-[13px]"></i> Excluir
              </button>
              <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
          }
          <button (click)="cancelar()" class="px-3.5 py-2 rounded-md border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition-colors text-sm shadow-sm">
              Cancelar
          </button>
          <button (click)="salvar()" [disabled]="saving" class="px-3.5 py-2 rounded-md bg-blue-600 text-white font-medium hover:bg-blue-700 shadow-sm transition-colors text-sm flex items-center gap-1.5 disabled:opacity-70 disabled:cursor-not-allowed">
              @if (!saving) {
                  <i class="pi pi-check text-xs"></i>
              } @else {
                  <i class="pi pi-spin pi-spinner text-xs"></i>
              }
              {{ saving ? 'Salvando...' : 'Salvar' }}
          </button>
      </div>
  </div>

  <div class="p-6 w-full space-y-8 mx-auto">

    <!-- Loading State -->
    @if (loading) {
        <div class="space-y-6">
            <div class="bg-white rounded-xl border border-slate-200 p-6 space-y-4 shadow-sm">
                <p-skeleton width="180px" height="1.25rem"></p-skeleton>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-12 md:col-span-8"><p-skeleton height="2.5rem"></p-skeleton></div>
                    <div class="col-span-12 md:col-span-4"><p-skeleton height="2.5rem"></p-skeleton></div>
                </div>
            </div>
            <div class="bg-white rounded-xl border border-slate-200 p-6 space-y-4 shadow-sm">
                <p-skeleton width="140px" height="1.25rem"></p-skeleton>
                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-12 md:col-span-4"><p-skeleton height="2.5rem"></p-skeleton></div>
                    <div class="col-span-12 md:col-span-4"><p-skeleton height="2.5rem"></p-skeleton></div>
                    <div class="col-span-12 md:col-span-4"><p-skeleton height="2.5rem"></p-skeleton></div>
                </div>
            </div>
        </div>
    } @else {
        <!-- Content Area -->
        <div class="animate-fade-in-up space-y-6">

            <!-- Section: Cliente & Identificação -->
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100">
                    <h3 class="font-bold text-slate-800 text-sm">Identificação</h3>
                </div>
                <div class="p-6 grid grid-cols-12 gap-4">
                    <!-- Cliente Search -->
                    <div class="col-span-12 md:col-span-8 space-y-1">
                        <label class="text-xs font-bold text-slate-700">
                            Cliente <span class="text-rose-500">*</span>
                            @if (id) {
                                <span class="ml-1 text-slate-400 font-normal">(não editável)</span>
                            }
                        </label>
                        <p-autoComplete
                            [(ngModel)]="selectedCliente"
                            [suggestions]="filteredClientes"
                            (completeMethod)="searchCliente($event)"
                            optionLabel="nome"
                            dataKey="id"
                            placeholder="Busque por Nome ou CPF/CNPJ..."
                            styleClass="w-full modern-autocomplete"
                            inputStyleClass="w-full modern-input"
                            [disabled]="!!id"
                            [forceSelection]="true"
                            [dropdown]="true">
                            <ng-template let-cliente pTemplate="item">
                                <div class="flex flex-col py-1">
                                    <span class="font-bold text-sm text-slate-900">{{ cliente.nome }}</span>
                                    <span class="text-xs text-slate-500">{{ cliente.cpfCnpj }}</span>
                                </div>
                            </ng-template>
                        </p-autoComplete>
                    </div>

                    <!-- Ativo/Status -->
                    <div class="col-span-12 md:col-span-4 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Status</label>
                        <p-select [options]="statusOptions" [(ngModel)]="form.status" optionLabel="label" optionValue="value" styleClass="w-full modern-select" placeholder="Selecione..." />
                    </div>

                    <!-- Placa -->
                    <div class="col-span-12 md:col-span-2 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Placa <span class="text-rose-500">*</span></label>
                        <input type="text" pInputText [(ngModel)]="form.placa" (blur)="onPlacaBlur()" class="w-full modern-input uppercase tracking-wider font-mono" placeholder="AAA0A00" maxlength="8" />
                    </div>

                    <!-- Marca -->
                    <div class="col-span-12 md:col-span-3 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Marca</label>
                        <p-select
                            [options]="marcaOptions"
                            [(ngModel)]="form.marcaId"
                            (onChange)="onMarcaChange()"
                            [loading]="loadingMarcas"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Selecione..." />
                    </div>

                    <!-- Modelo -->
                    <div class="col-span-12 md:col-span-5 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Modelo</label>
                        <p-select
                            [options]="modeloOptions"
                            [(ngModel)]="form.modeloId"
                            (onChange)="onModeloChange()"
                            [loading]="loadingModelos"
                            [disabled]="!form.marcaId"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Selecione..." />
                    </div>

                    <!-- Ano -->
                    <div class="col-span-12 md:col-span-2 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Ano</label>
                        <p-select
                            [options]="anoModeloOptions"
                            [(ngModel)]="form.anoModeloId"
                            [loading]="loadingAnosModelos"
                            [disabled]="!form.modeloId"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Ano..." />
                    </div>

                    <!-- Cor -->
                    <div class="col-span-12 md:col-span-3 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Cor</label>
                        <input type="text" pInputText [(ngModel)]="form.corExterna" class="w-full modern-input" placeholder="Ex: Preto" />
                    </div>

                    <!-- Combustível -->
                    <div class="col-span-12 md:col-span-3 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Combustível</label>
                        <p-select
                            [options]="combustivelOptions"
                            [(ngModel)]="form.combustivelId"
                            [loading]="loadingCombustiveis"
                            optionLabel="label"
                            optionValue="value"
                            styleClass="w-full modern-select"
                            appendTo="body"
                            placeholder="Selecione..." />
                    </div>

                    <!-- Renavam -->
                    <div class="col-span-12 md:col-span-3 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Renavam</label>
                        <input type="text" pInputText [(ngModel)]="form.renavam" class="w-full modern-input" placeholder="Ex: 00000000000" maxlength="11" />
                    </div>

                    <!-- Chassi -->
                    <div class="col-span-12 md:col-span-3 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Chassi</label>
                        <input type="text" pInputText [(ngModel)]="form.chassi" class="w-full modern-input uppercase font-mono" placeholder="VIN de 17 caracteres" maxlength="17" />
                    </div>
                </div>
            </div>

            <!-- Section: Detalhes Técnicos & Motor -->
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100">
                    <h3 class="font-bold text-slate-800 text-sm">Detalhes Técnicos & Motor</h3>
                </div>
                <div class="p-6 grid grid-cols-12 gap-4">
                    <!-- Nº Motor -->
                    <div class="col-span-12 md:col-span-4 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Nº Motor</label>
                        <input type="text" pInputText [(ngModel)]="form.numeroMotor" class="w-full modern-input uppercase font-mono" placeholder="Identificador do motor" />
                    </div>

                    <!-- Km Cadastro -->
                    <div class="col-span-12 md:col-span-4 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Km Cadastro</label>
                        <input type="number" pInputText [(ngModel)]="form.quilometragemCadastro" class="w-full modern-input" placeholder="Km inicial" />
                    </div>

                    <!-- Km Atual -->
                    <div class="col-span-12 md:col-span-4 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Km Atual</label>
                        <input type="number" pInputText [(ngModel)]="form.quilometragemAtual" class="w-full modern-input" placeholder="Km corrente" />
                    </div>
                </div>
            </div>

            <!-- Section: Manutenção -->
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100">
                    <h3 class="font-bold text-slate-800 text-sm">Manutenção e Revisões</h3>
                </div>
                <div class="p-6 grid grid-cols-12 gap-4">
                    <!-- Última Revisão -->
                    <div class="col-span-12 md:col-span-6 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Última Revisão</label>
                        <input type="date" pInputText [(ngModel)]="form.dataUltimaRevisao" class="w-full modern-input" />
                    </div>

                    <!-- Próxima Revisão -->
                    <div class="col-span-12 md:col-span-6 space-y-1">
                        <label class="text-xs font-bold text-slate-700">Próxima Revisão</label>
                        <input type="date" pInputText [(ngModel)]="form.proximaRevisaoData" class="w-full modern-input" />
                    </div>

                    <!-- Observações Gerais -->
                    <div class="col-span-12 space-y-1">
                         <label class="text-xs font-bold text-slate-700">Observações Gerais</label>
                        <textarea pTextarea [(ngModel)]="form.observacoes" rows="3" class="w-full modern-input" placeholder="Notas e particularidades sobre o veículo..."></textarea>
                    </div>
                </div>
            </div>

        </div>
    }
  </div>
</div>
