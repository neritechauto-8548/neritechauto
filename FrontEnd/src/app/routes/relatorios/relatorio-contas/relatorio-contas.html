<p-card styleClass="shadow-sm rounded-xl border border-slate-200">
  <div class="mb-5 border-b border-slate-100 pb-4">
    <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
      <i class="pi pi-file-pdf text-blue-600"></i>
      Relatório de Contas Financeiras
    </h1>
    <p class="text-xs text-slate-500 mt-1">Defina os filtros abaixo para gerar um relatório detalhado de contas a pagar e receber.</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-12 gap-5 mb-5">
    <div class="col-span-12 md:col-span-4">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Data Referência</label>
      <p-select [(ngModel)]="dataDe" [options]="dataDeOptions" optionLabel="label" optionValue="value" styleClass="w-full" />
    </div>
    <div class="col-span-12 md:col-span-4">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Data Inicial</label>
      <p-datepicker [(ngModel)]="dataInicial" dateFormat="dd/mm/yy" [showIcon]="true" styleClass="w-full" appendTo="body" />
    </div>
    <div class="col-span-12 md:col-span-4">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Data Final</label>
      <p-datepicker [(ngModel)]="dataFinal" dateFormat="dd/mm/yy" [showIcon]="true" styleClass="w-full" appendTo="body" />
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-12 gap-5 mb-5">
    <div class="col-span-12 md:col-span-4">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Situação e Tipo</label>
      <p-select [(ngModel)]="situacaoTipo" [options]="situacaoTipoOptions" optionLabel="label" optionValue="value" styleClass="w-full" />
    </div>
    <div class="col-span-12 md:col-span-8">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Centro de Custo / Departamento</label>
      <p-select [(ngModel)]="departamento" [options]="departamentoOptions" optionLabel="label" optionValue="value" styleClass="w-full" />
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-12 gap-5 mb-2">
    <div class="col-span-12 md:col-span-4">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Ordenar por</label>
      <p-select [(ngModel)]="ordenarPor" [options]="ordenarOptions" optionLabel="label" optionValue="value" styleClass="w-full" />
    </div>
    <div class="col-span-12 md:col-span-4 flex items-end pb-2">
      <p-checkbox [(ngModel)]="filtroAvancado" binary="true" inputId="filtro-avancado" />
      <label for="filtro-avancado" class="ml-2 text-sm font-semibold text-slate-700 cursor-pointer">Ativar filtro textual avançado</label>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-12 gap-5 mt-4 mb-5 p-4 bg-slate-50 rounded-lg border border-slate-200" *ngIf="filtroAvancado">
    <div class="col-span-12 md:col-span-4">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Filtrar por</label>
      <p-select [(ngModel)]="filtrarPor" [options]="filtrarPorOptions" optionLabel="label" optionValue="value" styleClass="w-full" />
    </div>
    <div class="col-span-12 md:col-span-8">
      <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-1.5">Termo de Busca</label>
      <input pInputText [(ngModel)]="filtro" placeholder="Digite o termo (ex: Código, Nome, CPF...)" class="w-full" />
    </div>
  </div>

  <div class="flex justify-end pt-5 border-t border-slate-100 gap-3 mt-6">
    <button pButton type="button" class="p-button-outlined p-button-secondary font-medium" icon="pi pi-times" label="Fechar"></button>
    <button pButton type="button" class="p-button-primary font-medium" icon="pi pi-print" label="Gerar e Imprimir Relatório" (click)="gerarRelatorio()" [loading]="isLoading"></button>
  </div>
</p-card>

<p-toast></p-toast>
