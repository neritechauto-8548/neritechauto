<div class="relatorio-clientes">
  <div class="panel">
    <div class="panel-header">
      <span class="title">{{ titulo }}</span>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label>Período</label>
        <select [(ngModel)]="periodo">
          <option *ngFor="let p of periodoOptions" [value]="p">{{ p }}</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Data inicial</label>
        <input type="date" [(ngModel)]="dataInicial" />
      </div>
      <div class="filter-group">
        <label>Data final</label>
        <input type="date" [(ngModel)]="dataFinal" />
      </div>
      <div class="filter-group grow">
        <label>Consulta</label>
        <select [(ngModel)]="consulta">
          <option *ngFor="let c of consultaOptions" [value]="c">{{ c }}</option>
        </select>
      </div>
    </div>

    <hr />

    <div class="actions">
      <button class="btn btn-secondary">Fechar</button>
      <button class="btn btn-primary" (click)="gerarRelatorio()">
        <span class="material-icons">insights</span>
        Gerar relatorio
      </button>
    </div>
  </div>
</div>
