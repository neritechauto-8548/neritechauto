<div class="flex flex-col h-full bg-slate-50 relative min-h-screen">
  <p-toast [style]="{top: '90px'}" [baseZIndex]="99999" />

  <!-- Action Bar (Sticky Top) -->
  <div class="bg-white px-6 py-3.5 border-b border-slate-200/60 flex items-center justify-between sticky top-0 z-30 shadow-sm backdrop-blur-sm">
      <div class="flex items-center gap-4">
          <button (click)="voltar()" class="w-8 h-8 rounded-md hover:bg-slate-100 flex items-center justify-center transition-colors text-slate-600">
              <i class="pi pi-arrow-left text-sm"></i>
          </button>
          <div>
              <h1 class="text-base font-semibold text-slate-900 leading-tight">{{ pageTitle }}</h1>
              <span class="text-xs text-slate-500 font-normal">{{ isEditMode ? 'Editando registro' : 'Novo registro' }}</span>
          </div>
      </div>

      <div class="flex gap-3 items-center">
          <button *ngIf="savedClienteId" (click)="excluirCliente()" class="px-3.5 py-1.5 rounded-md border border-rose-200 bg-white text-rose-600 font-medium hover:bg-rose-50 hover:border-rose-300 transition-colors text-sm flex items-center gap-1.5 shadow-sm">
             <i class="pi pi-trash text-[13px]"></i> Excluir
          </button>
          <div *ngIf="savedClienteId" class="h-6 w-px bg-slate-200 hidden sm:block"></div>
          <button (click)="cancelar()" class="px-3.5 py-2 rounded-md border border-slate-300 text-slate-700 font-medium hover:bg-slate-50 transition-colors text-sm shadow-sm">
              Cancelar
          </button>
          <button (click)="salvar()" class="px-3.5 py-2 rounded-md bg-emerald-600 text-white font-medium hover:bg-emerald-700 shadow-sm transition-colors text-sm flex items-center gap-1.5">
              <i class="pi pi-check text-xs"></i> Salvar
          </button>
      </div>
  </div>

  <div class="p-6 w-full space-y-8">

    <!-- Tabs as Pill Navigation -->
    <div class="flex justify-center">
        <div class="bg-slate-100 p-1 rounded-lg inline-flex border border-slate-200">
            <button
                *ngFor="let tab of tabs; let i = index"
                (click)="activeIndex = i"
                [class]="activeIndex === i ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'"
                class="px-4 py-1.5 rounded-md text-xs font-semibold transition-all flex items-center gap-2">
                <i [class]="tab.icon"></i> {{ tab.label }}
            </button>
        </div>
    </div>

    <!-- Content Area -->
    <div class="grid grid-cols-1 gap-6 animate-fade-in-up">

        <!-- Tab 0: Dados Gerais -->
        <div *ngIf="activeIndex === 0" class="space-y-6">

            <!-- Section: Info Básica -->
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                <div class="bg-slate-50/50 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                    <h3 class="font-bold text-slate-800 text-sm">Informações Básicas</h3>
                    <div class="flex gap-1 bg-white border border-slate-200 rounded p-0.5" [title]="isEditMode ? 'Tipo de pessoa não pode ser alterado na edição' : ''">
                        <button (click)="!isEditMode && (model.tipoPessoa = 'Física') && onTipoPessoaChange()" [class.bg-slate-100]="model.tipoPessoa === 'Física'" [disabled]="isEditMode" [class.opacity-60]="isEditMode" [class.cursor-not-allowed]="isEditMode" class="px-3 py-1 rounded text-xs font-bold text-slate-600 transition-colors">Pessoa Física</button>
                        <button (click)="!isEditMode && (model.tipoPessoa = 'Jurídica') && onTipoPessoaChange()" [class.bg-slate-100]="model.tipoPessoa === 'Jurídica'" [disabled]="isEditMode" [class.opacity-60]="isEditMode" [class.cursor-not-allowed]="isEditMode" class="px-3 py-1 rounded text-xs font-bold text-slate-600 transition-colors">Jurídica</button>
                     </div>
                </div>

                <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                     <!-- Col 1 -->
                     <div class="space-y-4">
                         <div class="space-y-1">
                             <label class="text-xs font-bold text-slate-700">
                                 {{ model.tipoPessoa === 'Física' ? 'Nome Completo' : 'Razão Social' }}
                             </label>

                             <input *ngIf="model.tipoPessoa === 'Física'" type="text" pInputText
                                 [(ngModel)]="model.nomeRazao"
                                 class="w-full modern-input"
                                 placeholder="Ex: João Silva" />

                             <input *ngIf="model.tipoPessoa !== 'Física'" type="text" pInputText
                                 [(ngModel)]="model.razaoSocial"
                                 class="w-full modern-input"
                                 placeholder="Ex: NeriTech Ltda" />
                         </div>

                         <div class="space-y-1" *ngIf="model.tipoPessoa === 'Jurídica'">
                             <label class="text-xs font-bold text-slate-700">Nome Fantasia</label>
                             <input type="text" pInputText [(ngModel)]="model.nomeFantasia" class="w-full modern-input" placeholder="Ex: NeriTech" />
                         </div>

                         <div class="space-y-1">
                             <label class="text-xs font-bold text-slate-700">Email (Opcional)</label>
                             <input type="email" pInputText [(ngModel)]="model.email" class="w-full modern-input" placeholder="cliente@email.com" />
                         </div>
                     </div>

                     <!-- Col 2 -->
                     <div class="space-y-4">
                         <div class="space-y-1">
                             <label class="text-xs font-bold text-slate-700">
                                 {{ model.tipoPessoa === 'Física' ? 'CPF' : 'CNPJ' }}
                             </label>
                             <input type="text" pInputText [(ngModel)]="model.cpfCnpj" (input)="onCpfCnpjInput($event)" class="w-full modern-input font-mono text-sm" placeholder="000.000.000-00" />
                         </div>

                         <div class="grid grid-cols-2 gap-4">
                              <div class="space-y-1" *ngIf="model.tipoPessoa === 'Jurídica'">
                                  <label class="text-xs font-bold text-slate-700">Inscr. Municipal</label>
                                  <input type="text" pInputText [(ngModel)]="model.inscricaoMunicipal" class="w-full modern-input" />
                              </div>
                              <div class="space-y-1" *ngIf="model.tipoPessoa === 'Física'">
                                  <label class="text-xs font-bold text-slate-700">Data Nasc.</label>
                                  <p-datepicker [(ngModel)]="model.dataNascimento" appendTo="body" styleClass="w-full" inputStyleClass="w-full modern-input" placeholder="dd/mm/aaaa" />
                              </div>
                              <div class="space-y-1" *ngIf="model.tipoPessoa === 'Jurídica'">
                                  <label class="text-xs font-bold text-slate-700">Inscr. Estadual</label>
                                  <input type="text" pInputText [(ngModel)]="model.inscricaoEstadual" class="w-full modern-input" />
                              </div>
                         </div>
                     </div>
                </div>
            </div>

            <!-- Section: Status & Origem -->
            <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-1">
                     <label class="text-xs font-bold text-slate-700">Origem do Cliente</label>
                     <p-select [options]="origemOptions" [(ngModel)]="model.origemCliente" optionLabel="label" optionValue="value" appendTo="body" styleClass="w-full modern-select" placeholder="Selecione..." />
                </div>
                <div class="space-y-1">
                     <label class="text-xs font-bold text-slate-700">Status</label>
                     <p-select [options]="situacoes" [(ngModel)]="model.situacao" appendTo="body" styleClass="w-full modern-select" />
                </div>
                <div class="md:col-span-2 space-y-1">
                     <label class="text-xs font-bold text-slate-700">Observações Internas</label>
                     <textarea pTextarea [(ngModel)]="model.observacao" rows="3" class="w-full modern-input" placeholder="Notas sobre o cliente..."></textarea>
                </div>
            </div>

        </div>

        <!-- Tab 1: Endereço (Single Section Grid) -->
        <div *ngIf="activeIndex === 1" class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm p-6">
             <div class="grid grid-cols-1 md:grid-cols-6 gap-6">
                 <div class="md:col-span-2 space-y-1">
                     <label class="text-xs font-bold text-slate-700">CEP</label>
                     <div class="flex gap-2">
                         <input type="text" pInputText [(ngModel)]="model.cep" (input)="onCepInput($event)" class="w-full modern-input" placeholder="00000-000" />
                         <button class="bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-lg px-3 border border-slate-200"><i class="pi pi-search"></i></button>
                     </div>
                 </div>
                 <div class="md:col-span-4 space-y-1">
                     <label class="text-xs font-bold text-slate-700">Rua / Avenida</label>
                     <input type="text" pInputText [(ngModel)]="model.logradouro" class="w-full modern-input" />
                 </div>

                 <div class="md:col-span-1 space-y-1">
                     <label class="text-xs font-bold text-slate-700">Número</label>
                     <input type="text" pInputText [(ngModel)]="model.numero" class="w-full modern-input" />
                 </div>
                 <div class="md:col-span-2 space-y-1">
                     <label class="text-xs font-bold text-slate-700">Complemento</label>
                     <input type="text" pInputText [(ngModel)]="model.complemento" class="w-full modern-input" />
                 </div>
                 <div class="md:col-span-3 space-y-1">
                     <label class="text-xs font-bold text-slate-700">Bairro</label>
                     <input type="text" pInputText [(ngModel)]="model.bairro" class="w-full modern-input" />
                 </div>

                 <div class="md:col-span-3 space-y-1">
                     <label class="text-xs font-bold text-slate-700">Cidade</label>
                     <input type="text" pInputText [(ngModel)]="model.cidade" class="w-full modern-input" />
                 </div>
                 <div class="md:col-span-1 space-y-1">
                     <label class="text-xs font-bold text-slate-700">UF</label>
                     <input type="text" pInputText [(ngModel)]="model.estado" class="w-full modern-input" />
                 </div>
             </div>
        </div>

        <!-- Tab 2: Contato -->
        <div *ngIf="activeIndex === 2" class="space-y-4">
             <div class="flex justify-end">
                 <button (click)="abrirDialogContato()" class="text-sm font-medium text-blue-600 bg-white hover:bg-blue-50 px-3.5 py-2 rounded-md transition-colors border border-blue-300 shadow-sm">
                     + Adicionar Contato
                 </button>
             </div>

             <div class="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                 <table class="w-full text-sm text-left">
                     <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 font-semibold uppercase text-xs">
                         <tr>
                             <th class="px-6 py-3">Tipo</th>
                             <th class="px-6 py-3">Valor</th>
                             <th class="px-6 py-3 text-right">Ações</th>
                         </tr>
                     </thead>
                     <tbody class="divide-y divide-slate-100">
                         <tr *ngFor="let cont of contatosList; let i = index" class="hover:bg-slate-50/50">
                             <td class="px-6 py-3">
                                 <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded textxs border border-slate-200">{{ getTipoContatoLabel(cont.tipoContato) }}</span>
                             </td>
                             <td class="px-6 py-3 font-medium text-slate-800">{{ cont.valor }}</td>
                             <td class="px-6 py-3 text-right">
                                 <button (click)="editarContatoLista(i)" class="text-slate-400 hover:text-blue-500 transition-colors mr-3" title="Editar Contato"><i class="pi pi-pencil"></i></button>
                                 <button (click)="removerContatoLista(i)" class="text-slate-400 hover:text-rose-500 transition-colors" title="Excluir Contato"><i class="pi pi-trash"></i></button>
                             </td>
                         </tr>
                         <tr *ngIf="contatosList.length === 0">
                             <td colspan="4" class="px-6 py-8 text-center text-slate-400 italic">Nenhum contato adicionado.</td>
                         </tr>
                     </tbody>
                 </table>
             </div>
         </div>

    </div>
  </div>
</div>

<!-- Simple clean dialog for contacts -->
<p-dialog [(visible)]="showContatoDialog" [modal]="true" [style]="{width: '400px'}" header="Novo Contato" styleClass="modern-dialog">
    <div class="space-y-4 pt-2">
        <div class="space-y-1">
            <label class="text-xs font-bold text-slate-700">Tipo</label>
            <p-select [options]="tipoContatoOptions" [(ngModel)]="contatoForm.tipoContato" optionLabel="label" optionValue="value" styleClass="w-full modern-select" />
        </div>
        <div class="space-y-1">
            <label class="text-xs font-bold text-slate-700">Valor</label>
            <input type="text" pInputText [(ngModel)]="contatoForm.valor" class="w-full modern-input" placeholder="(00) 00000-0000" />
        </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
        <button (click)="showContatoDialog = false" class="px-4 py-2 rounded-lg text-slate-500 hover:bg-slate-100 text-sm font-bold">Cancelar</button>
        <button (click)="salvarContatoLista()" class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:bg-blue-700 text-sm font-bold">Adicionar</button>
    </div>
</p-dialog>
