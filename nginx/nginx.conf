events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Backend API (Spring Boot)
    server {
        listen 80;
        server_name api.neritech.com; # Altere para seu domínio

        location / {
            proxy_pass http://backend:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Portal de Suporte (Zammad)
    server {
        listen 80;
        server_name suporte.neritech.com; # Altere para seu domínio

        location / {
            # Direciona para o serviço do Zammad (ajuste o nome se necessário)
            proxy_pass http://zammad-nginx:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Zammad requer websocket para algumas funções
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
