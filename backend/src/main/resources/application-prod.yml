spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    # Parâmetros para desabilitar cache de prepared statements e evitar erro "prepared statement already exists"
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/nerisys?prepareThreshold=0&preparedStatementCacheQueries=0&preparedStatementCacheSizeMiB=0}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:94573730}
    hikari:
      maximum-pool-size: 4
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      data-source-properties:
        prepareThreshold: 0
        preparedStatementCacheQueries: 0
        preparedStatementCacheSizeMiB: 0

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false
        jdbc:
          time_zone: UTC
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    ignore-missing-migrations: true
    validate-on-migrate: true
    out-of-order: false
    clean-disabled: true
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5434/nerisys}
    user: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:94573730}

  security:
    jwt:
      secret: ${JWT_SECRET:}
      expiration: 86400000 # 24 hours in milliseconds

  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:neritechauto@gmail.com}
    password: ${SMTP_PASSWORD:evpcmqdrkbzqymdn}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          ssl:
            trust: "*"

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    enabled: true
  packages-to-scan: com.neritech.saas

# Logging
logging:
  level:
    root: INFO
    com.neritech.saas: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
    org.flywaydb: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management/Actuator (opcional, para health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

stripe:
  api:
    key: ${STRIPE_API_KEY:}
