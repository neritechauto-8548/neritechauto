spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        show_sql: true
        jdbc:
          time_zone: UTC
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  flyway:
    enabled: false

  mail:
    host: smtp.gmail.com
    port: 587
    username: '' # TODO: Your SMTP Email
    password: '' # TODO: Your SMTP App Password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  packages-to-scan: com.neritech.saas

logging:
  level:
    com.neritech.saas: DEBUG
    com.neritech.saas.common.tenancy: DEBUG
    org.springframework.web: DEBUG

stripe:
  api:
    key: '' # TODO: Your Stripe Secret Key (sk_test_...)