spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: false

# JWT Config para testes
application:
  security:
    jwt:
      secret-key: test-secret-key-for-jwt-token-generation-minimum-256-bits-required-for-hs256-algorithm
      expiration: 86400000 # 1 dia
      refresh-token:
        expiration: 604800000 # 7 dias

# Logging
logging:
  level:
    com.neritech.saas: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
